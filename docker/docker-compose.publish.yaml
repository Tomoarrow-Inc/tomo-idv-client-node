services:
  publish:
    build:
      context: ..
      dockerfile: docker/Dockerfile.publish
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - npm-cache:/root/.npm
      - npm-data:/root/.npm-data
    environment:
      - NPM_CONFIG_USERCONFIG=/root/.npm-data/.npmrc
    tty: true
    stdin_open: true
    entrypoint: ["bash"]

volumes:
  npm-cache:
  npm-data:
